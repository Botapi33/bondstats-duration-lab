<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BondStats Duration Lab (Premium)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:-apple-system,Arial;background:#0b1220;color:#fff}
.container{display:grid;grid-template-columns:340px 1fr;height:100vh}
.sidebar{background:#111827;padding:20px}
.main{padding:20px;overflow:auto}

h2{margin-top:0}

input,button,textarea{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:8px;
}

input{background:#020617;color:#fff}
textarea{background:#020617;color:#fff;height:120px}

button{
background:linear-gradient(90deg,#2563eb,#3b82f6);
color:#fff;
cursor:pointer;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
margin-bottom:20px;
}

.card{
background:#020617;
padding:15px;
border-radius:10px;
}

.value{font-size:22px;font-weight:bold}

.insight{
background:#111827;
padding:15px;
border-left:4px solid #3b82f6;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

td,th{
border:1px solid #333;
padding:8px;
}

canvas{
background:#020617;
margin-top:20px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">

<h2>Duration Lab</h2>

<label>Face Value</label>
<input id="face" value="1000">

<label>Coupon (%)</label>
<input id="coupon" value="5">

<label>Yield (%)</label>
<input id="yield" value="4">

<label>Maturity</label>
<input id="years" value="10">

<label>Position ($)</label>
<input id="pos" value="100000">

<button id="runBtn">Run Analysis</button>

<hr>

<h3>Portfolio</h3>
<button id="addBtn">Add Bond</button>
<button id="portfolioBtn">Run Portfolio</button>

<h3>Export</h3>
<button id="exportBtn">Generate Report</button>

</div>

<div class="main">

<div class="grid">
<div class="card"><div>Price</div><div id="price" class="value">-</div></div>
<div class="card"><div>Duration</div><div id="dur" class="value">-</div></div>
<div class="card"><div>Mod Duration</div><div id="mod" class="value">-</div></div>
<div class="card"><div>Convexity</div><div id="conv" class="value">-</div></div>
</div>

<div id="insight" class="insight">
Run analysis to generate insight...
</div>

<canvas id="chart" width="900" height="250"></canvas>

<table>
<thead>
<tr><th>Shock</th><th>% Change</th><th>P/L</th></tr>
</thead>
<tbody id="table"></tbody>
</table>

<h3>Portfolio Output</h3>
<div id="portfolioOutput"></div>

<h3>Export Report</h3>
<textarea id="report"></textarea>

</div>

</div>

<script>

const runBtn=document.getElementById("runBtn");
const addBtn=document.getElementById("addBtn");
const portfolioBtn=document.getElementById("portfolioBtn");
const exportBtn=document.getElementById("exportBtn");

let portfolio=[];

// CALC
function calc(F,c,y,n){
let price=0,dur=0,conv=0;

for(let t=1;t<=n;t++){
let cf=F*c;
if(t===n) cf+=F;

let pv=cf/Math.pow(1+y,t);

price+=pv;
dur+=t*pv;
conv+=t*(t+1)*pv;
}

dur/=price;
let mod=dur/(1+y);
conv=conv/(price*Math.pow(1+y,2));

return {price,dur,mod,conv};
}

// INSIGHT
function insight(r){
if(r.mod>8) return "Very high interest rate risk. Large volatility expected.";
if(r.mod>5) return "Moderate risk profile with noticeable sensitivity.";
return "Low risk bond. Stable under rate changes.";
}

// RUN
function run(){

let F=+face.value;
let c=+coupon.value/100;
let y=+yield.value/100;
let n=+years.value;
let p=+pos.value;

let r=calc(F,c,y,n);

price.textContent=r.price.toFixed(2);
dur.textContent=r.dur.toFixed(2);
mod.textContent=r.mod.toFixed(2);
conv.textContent=r.conv.toFixed(2);

document.getElementById("insight").textContent=insight(r);

let shocks=[-200,-100,-50,-25,25,50,100,200];
table.innerHTML="";
let pts=[];

shocks.forEach(s=>{
let dy=s/10000;
let change=(-r.mod*dy+0.5*r.conv*dy*dy);
let pnl=p*change;

pts.push(change);

table.innerHTML+=`
<tr>
<td>${s}</td>
<td>${(change*100).toFixed(2)}%</td>
<td>${pnl.toFixed(0)}</td>
</tr>`;
});

// chart
let ctx=chart.getContext("2d");
ctx.clearRect(0,0,900,250);
ctx.beginPath();

pts.forEach((p,i)=>{
let x=i*(900/pts.length);
let y=125-p*2000;

if(i===0) ctx.moveTo(x,y);
else ctx.lineTo(x,y);
});

ctx.strokeStyle="cyan";
ctx.stroke();

window.lastResult={r,p};

}

// PORTFOLIO
function addBond(){
portfolio.push(window.lastResult);
}

function runPortfolio(){
let total=0;

portfolio.forEach(b=>{
total+=b.p*(-b.r.mod*0.01);
});

portfolioOutput.textContent="Portfolio P/L (100bps): "+total.toFixed(0);
}

// EXPORT
function exportReport(){
if(!window.lastResult) return;

let r=window.lastResult.r;

report.value=`Bond Duration Report

Price: ${r.price.toFixed(2)}
Duration: ${r.dur.toFixed(2)}
Convexity: ${r.conv.toFixed(2)}

Insight:
${insight(r)}
`;
}

// EVENTS
runBtn.addEventListener("click",run);
addBtn.addEventListener("click",addBond);
portfolioBtn.addEventListener("click",runPortfolio);
exportBtn.addEventListener("click",exportReport);

</script>

</body>
</html>
