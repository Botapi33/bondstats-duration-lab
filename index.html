<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bond Risk Simulator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:-apple-system,Arial;
background:#0b1220;
color:white;
}

.container{
display:grid;
grid-template-columns:320px 1fr;
height:100vh;
}

.sidebar{
background:#111827;
padding:20px;
}

.main{
padding:20px;
overflow:auto;
}

/* HEADLINE */
.header{
margin-bottom:20px;
}

.header h1{
margin:0;
font-size:28px;
}

.header p{
color:#9ca3af;
}

/* INPUTS */
input{
width:100%;
padding:10px;
margin-bottom:10px;
background:#020617;
color:white;
border:none;
}

button{
width:100%;
padding:12px;
margin-top:5px;
background:linear-gradient(90deg,#2563eb,#3b82f6);
border:none;
color:white;
cursor:pointer;
}

/* KPI */
.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
margin-bottom:20px;
}

.card{
background:#020617;
padding:15px;
border-radius:10px;
}

.value{
font-size:22px;
font-weight:bold;
}

/* INSIGHT */
.insight{
background:#111827;
padding:15px;
border-left:4px solid #3b82f6;
margin-bottom:20px;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
}

td,th{
border:1px solid #333;
padding:8px;
}

/* CHART */
canvas{
background:#020617;
margin-top:20px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">

<h2>Bond Setup</h2>

<label>Face Value</label>
<input id="face" value="1000">

<label>Coupon (%)</label>
<input id="coupon" value="5">

<label>Yield (%)</label>
<input id="yield" value="4">

<label>Maturity</label>
<input id="years" value="10">

<label>Position ($)</label>
<input id="pos" value="100000">

<button id="runBtn">Run Simulation</button>

</div>

<div class="main">

<div class="header">
<h1>Bond Risk Simulator</h1>
<p>Understand how interest rate changes impact your bond portfolio instantly.</p>
</div>

<div class="grid">
<div class="card"><div>Price</div><div id="price" class="value">-</div></div>
<div class="card"><div>Duration</div><div id="dur" class="value">-</div></div>
<div class="card"><div>Mod Duration</div><div id="mod" class="value">-</div></div>
<div class="card"><div>Convexity</div><div id="conv" class="value">-</div></div>
</div>

<div id="insight" class="insight">
Run simulation to generate insight...
</div>

<canvas id="chart" width="900" height="250"></canvas>

<table>
<thead>
<tr><th>Shock</th><th>% Change</th><th>P/L</th></tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

</div>

<script>

document.getElementById("runBtn").addEventListener("click", run);

function calc(F,c,y,n){
let price=0,dur=0,conv=0;

for(let t=1;t<=n;t++){
let cf=F*c;
if(t===n) cf+=F;

let pv=cf/Math.pow(1+y,t);

price+=pv;
dur+=t*pv;
conv+=t*(t+1)*pv;
}

dur/=price;
let mod=dur/(1+y);
conv=conv/(price*Math.pow(1+y,2));

return {price,dur,mod,conv};
}

function insight(r){

if(r.mod>8) return "Very high interest rate sensitivity. Small rate changes can significantly impact price.";
if(r.mod>5) return "Moderate sensitivity. Bond reacts meaningfully to rate changes.";
return "Low sensitivity. Bond remains relatively stable.";
}

function run(){

let F=+face.value;
let c=+coupon.value/100;
let y=+yield.value/100;
let n=+years.value;
let p=+pos.value;

let r=calc(F,c,y,n);

// KPIs
price.textContent=r.price.toFixed(2);
dur.textContent=r.dur.toFixed(2);
mod.textContent=r.mod.toFixed(2);
conv.textContent=r.conv.toFixed(2);

// Insight
document.getElementById("insight").textContent=insight(r);

// Table + Chart
let shocks=[-200,-100,-50,-25,25,50,100,200];
let pts=[];
table.innerHTML="";

shocks.forEach(s=>{
let dy=s/10000;
let change=(-r.mod*dy+0.5*r.conv*dy*dy);
let pnl=p*change;

pts.push(change);

table.innerHTML+=`
<tr>
<td>${s}</td>
<td>${(change*100).toFixed(2)}%</td>
<td>${pnl.toFixed(0)}</td>
</tr>`;
});

// Chart
let ctx=chart.getContext("2d");
ctx.clearRect(0,0,900,250);
ctx.beginPath();

pts.forEach((p,i)=>{
let x=i*(900/pts.length);
let y=125-p*2000;

if(i===0) ctx.moveTo(x,y);
else ctx.lineTo(x,y);
});

ctx.strokeStyle="cyan";
ctx.stroke();

}

</script>

</body>
</html>
