<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BondStats Duration Lab</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:-apple-system,Arial;background:#0b1220;color:#fff}
.container{display:grid;grid-template-columns:340px 1fr;height:100vh}
.sidebar{background:#111827;padding:20px}
.main{padding:20px;overflow:auto}

h2{margin-top:0}

input,button{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:8px;
}

input{background:#020617;color:#fff}

button{
background:linear-gradient(90deg,#2563eb,#3b82f6);
color:#fff;
cursor:pointer;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
margin-bottom:20px;
}

.card{
background:#020617;
padding:15px;
border-radius:10px;
}

.value{font-size:22px;font-weight:bold}

.insight{
background:#111827;
padding:15px;
border-left:4px solid #3b82f6;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

td,th{
border:1px solid #333;
padding:8px;
}

canvas{
background:#020617;
margin-top:20px;
border-radius:10px;
}

/* PORTFOLIO */
.portfolio-item{
background:#020617;
padding:10px;
margin-bottom:8px;
display:flex;
justify-content:space-between;
align-items:center;
border-radius:8px;
}

.delete-btn{
background:#ef4444;
padding:6px 10px;
width:auto;
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">

<h2>Duration Lab</h2>

<input id="face" value="1000">
<input id="coupon" value="5">
<input id="yield" value="4">
<input id="years" value="10">
<input id="pos" value="100000">

<button id="runBtn">Run Analysis</button>

<hr>

<h3>Portfolio</h3>
<button id="addBtn">Add Bond</button>
<button id="portfolioBtn">Run Portfolio</button>

<div id="portfolioList"></div>

</div>

<div class="main">

<div class="grid">
<div class="card"><div>Price</div><div id="price" class="value">-</div></div>
<div class="card"><div>Duration</div><div id="dur" class="value">-</div></div>
<div class="card"><div>Mod Duration</div><div id="mod" class="value">-</div></div>
<div class="card"><div>Convexity</div><div id="conv" class="value">-</div></div>
</div>

<div id="insight" class="insight">Run analysis...</div>

<canvas id="chart" width="900" height="250"></canvas>

<table>
<thead>
<tr><th>Shock</th><th>%</th><th>P/L</th></tr>
</thead>
<tbody id="table"></tbody>
</table>

<h3>Portfolio Output</h3>
<div id="portfolioOutput"></div>

</div>

</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

let portfolio=[];

const face=document.getElementById("face");
const coupon=document.getElementById("coupon");
const yieldEl=document.getElementById("yield");
const years=document.getElementById("years");
const pos=document.getElementById("pos");

const price=document.getElementById("price");
const dur=document.getElementById("dur");
const mod=document.getElementById("mod");
const conv=document.getElementById("conv");
const insight=document.getElementById("insight");

const table=document.getElementById("table");
const chart=document.getElementById("chart");

const portfolioList=document.getElementById("portfolioList");
const portfolioOutput=document.getElementById("portfolioOutput");

// CALC
function calc(F,c,y,n){
let price=0,dur=0,conv=0;

for(let t=1;t<=n;t++){
let cf=F*c;
if(t===n) cf+=F;

let pv=cf/Math.pow(1+y,t);

price+=pv;
dur+=t*pv;
conv+=t*(t+1)*pv;
}

dur/=price;
let mod=dur/(1+y);
conv=conv/(price*Math.pow(1+y,2));

return {price,dur,mod,conv};
}

// INSIGHT
function getInsight(r){
if(r.mod>8) return "High interest rate sensitivity";
if(r.mod>5) return "Moderate sensitivity";
return "Low sensitivity";
}

// RUN
function run(){

let F=+face.value;
let c=+coupon.value/100;
let y=+yieldEl.value/100;
let n=+years.value;
let p=+pos.value;

let r=calc(F,c,y,n);

price.textContent=r.price.toFixed(2);
dur.textContent=r.dur.toFixed(2);
mod.textContent=r.mod.toFixed(2);
conv.textContent=r.conv.toFixed(2);

insight.textContent=getInsight(r);

// TABLE
let shocks=[-200,-100,-50,-25,25,50,100,200];
table.innerHTML="";
let pts=[];

shocks.forEach(s=>{
let dy=s/10000;
let change=(-r.mod*dy+0.5*r.conv*dy*dy);
let pnl=p*change;

pts.push(change);

table.innerHTML+=`
<tr>
<td>${s}</td>
<td>${(change*100).toFixed(2)}%</td>
<td>${pnl.toFixed(0)}</td>
</tr>`;
});

// CHART
let ctx=chart.getContext("2d");
ctx.clearRect(0,0,900,250);
ctx.beginPath();

pts.forEach((p,i)=>{
let x=i*(900/pts.length);
let y=125-p*2000;

if(i===0) ctx.moveTo(x,y);
else ctx.lineTo(x,y);
});

ctx.strokeStyle="cyan";
ctx.stroke();

}

// ADD BOND
function addBond(){

let F=+face.value;
let c=+coupon.value/100;
let y=+yieldEl.value/100;
let n=+years.value;
let p=+pos.value;

portfolio.push({F,c,y,n,p});

renderPortfolio();
}

// RENDER
function renderPortfolio(){

portfolioList.innerHTML="";

portfolio.forEach((b,i)=>{
let div=document.createElement("div");
div.className="portfolio-item";

div.innerHTML=`
<span>Bond ${i+1} | $${b.p}</span>
<button class="delete-btn" data-id="${i}">X</button>
`;

portfolioList.appendChild(div);
});

// delete
document.querySelectorAll(".delete-btn").forEach(btn=>{
btn.addEventListener("click",function(){
let id=this.getAttribute("data-id");
portfolio.splice(id,1);
renderPortfolio();
});
});

}

// RUN PORTFOLIO
function runPortfolio(){

if(portfolio.length===0){
alert("No bonds added");
return;
}

let total=0;

portfolio.forEach(b=>{
let r=calc(b.F,b.c,b.y,b.n);
total+=b.p*(-r.mod*0.01);
});

portfolioOutput.textContent=
"Portfolio P/L (100bps): "+total.toFixed(0);
}

// EVENTS
document.getElementById("runBtn").addEventListener("click",run);
document.getElementById("addBtn").addEventListener("click",addBond);
document.getElementById("portfolioBtn").addEventListener("click",runPortfolio);

});

</script>

</body>
</html>
